<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Aura — AI-powered spatial companion. Live better with what you have.">
    <meta name="theme-color" content="#0f0f1a">
    <title>Aura — Spatial Companion</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
</head>
<body>
    <!-- ── App Shell ─────────────────────────────── -->
    <div id="app">

        <!-- Header -->
        <header id="header" class="app-header">
            <div class="header-left">
                <span class="logo">✦</span>
                <h1>Aura</h1>
            </div>
            <div class="header-right">
                <button id="btn-camera" class="icon-btn" aria-label="Open camera">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                        <circle cx="12" cy="13" r="4"/>
                    </svg>
                </button>
                <button id="btn-profile" class="icon-btn" aria-label="Profile">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Main Chat Area -->
        <main id="chat-area" class="chat-area">
            <div id="messages" class="messages">
                <!-- Welcome message -->
                <div class="message aura-message">
                    <div class="message-avatar">✦</div>
                    <div class="message-content">
                        <p>Hello! I'm <strong>Aura</strong>, your spatial companion.</p>
                        <p>I help you live better with what you already have. Show me your space or tell me about it — I'll share personalised ideas to make it work better for you.</p>
                        <div class="quick-actions">
                            <button class="chip" data-action="scan">📷 Scan my space</button>
                            <button class="chip" data-action="tips">💡 Quick tips</button>
                            <button class="chip" data-action="weather">🌤️ Weather check</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Input Bar -->
        <footer id="input-bar" class="input-bar">
            <div class="input-wrapper">
                <input
                    type="text"
                    id="message-input"
                    placeholder="Ask Aura anything..."
                    autocomplete="off"
                    aria-label="Type a message"
                >
                <button id="btn-send" class="send-btn" aria-label="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
        </footer>

        <!-- Camera Modal -->
        <div id="camera-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Scan Your Space</h2>
                    <button id="btn-close-camera" class="icon-btn" aria-label="Close camera">✕</button>
                </div>
                <div class="camera-container">
                    <video id="camera-feed" autoplay playsinline></video>
                    <canvas id="camera-canvas" class="hidden"></canvas>
                </div>
                <div class="camera-controls">
                    <button id="btn-capture" class="capture-btn" aria-label="Capture photo">
                        <div class="capture-ring"></div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Profile Modal -->
        <div id="profile-modal" class="modal hidden">
            <div class="modal-overlay"></div>
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Your Profile</h2>
                    <button id="btn-close-profile" class="icon-btn" aria-label="Close profile">✕</button>
                </div>
                <form id="profile-form" class="profile-form">
                    <div class="form-group">
                        <label for="household">Household Members</label>
                        <input type="text" id="household" placeholder="e.g. toddler, elderly parent">
                    </div>
                    <div class="form-group">
                        <label for="mobility">Mobility Notes</label>
                        <input type="text" id="mobility" placeholder="e.g. uses walking aid">
                    </div>
                    <div class="form-group">
                        <label for="interests">Interests</label>
                        <input type="text" id="interests" placeholder="e.g. gardening, reading">
                    </div>
                    <div class="form-group">
                        <label for="space-type">Space Type</label>
                        <select id="space-type">
                            <option value="">Select...</option>
                            <option value="apartment">Apartment</option>
                            <option value="house">House</option>
                            <option value="studio">Studio</option>
                            <option value="shared">Shared accommodation</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary">Save Profile</button>
                </form>
            </div>
        </div>

    </div>

    <script src="/js/api.js"></script>
    <script src="/js/camera.js"></script>
    <script src="/js/chat.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
